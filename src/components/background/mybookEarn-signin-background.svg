<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" fill="none">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="25%" stop-color="#3B82F6"/>
      <stop offset="65%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Layer: Background -->
  <g id="background">
    <rect width="1920" height="1080" fill="url(#bg-gradient)"/>
  </g>

  <!-- Layer: Geometric Shapes -->
  <g id="geometric-shapes" opacity="0.35">
    <circle cx="180" cy="140" r="90" fill="#FFFFFF" opacity="0.08"/>
    <circle cx="1680" cy="920" r="120" fill="#38BDF8" opacity="0.15"/>
    <polygon points="1720,180 1780,220 1720,260 1660,220" fill="#FFFFFF" opacity="0.1"/>
    <polygon points="120,880 180,920 120,960 60,920" fill="#60A5FA" opacity="0.12"/>
    <rect x="1580" y="420" width="80" height="80" rx="16" transform="rotate(15 1620 460)" fill="#FFFFFF" opacity="0.06"/>
    <ellipse cx="960" cy="540" rx="280" ry="320" fill="#FFFFFF" opacity="0.04"/>
  </g>

  <!-- Layer: Glow Blobs -->
  <g id="glow-blobs" filter="url(#soft-blur)">
    <circle cx="120" cy="80" r="210" fill="#FFFFFF" opacity="0.28"/>
    <circle cx="1760" cy="980" r="260" fill="#38BDF8" opacity="0.32"/>
    <circle cx="300" cy="900" r="180" fill="#60A5FA" opacity="0.2"/>
  </g>

  <!-- Layer: Particles -->
  <g id="particles" fill="#FFFFFF" opacity="0.45">
    <circle cx="220" cy="260" r="2.5"/><circle cx="380" cy="180" r="2"/>
    <circle cx="540" cy="320" r="3"/><circle cx="720" cy="140" r="2"/>
    <circle cx="1180" cy="220" r="2.5"/><circle cx="1340" cy="160" r="2"/>
    <circle cx="1500" cy="300" r="3"/><circle cx="1680" cy="240" r="2"/>
    <circle cx="260" cy="720" r="2"/><circle cx="420" cy="840" r="2.5"/>
    <circle cx="1480" cy="760" r="2"/><circle cx="1620" cy="680" r="3"/>
    <circle cx="180" cy="520" r="2"/><circle cx="1740" cy="520" r="2.5"/>
  </g>

  <!-- Layer: Center Safe Area (empty for sign-in form) -->
  <g id="center-safe-area">
    <rect x="700" y="215" width="520" height="650" rx="32" fill="#FFFFFF" opacity="0.03" stroke="#FFFFFF" stroke-opacity="0.08" stroke-dasharray="8 8"/>
  </g>

  <!-- Layer: Digital Board -->
  <g id="digital-board" transform="translate(120, 120)">
    <rect x="0" y="0" width="340" height="200" rx="24" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.22"/>
    <rect x="24" y="24" width="292" height="152" rx="16" fill="#1E3A8A" fill-opacity="0.35"/>
    <text x="170" y="88" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,sans-serif" font-size="34" font-weight="700" letter-spacing="1">MybookEarn</text>
    <text x="170" y="128" text-anchor="middle" fill="#E0F2FE" font-family="Inter,Segoe UI,sans-serif" font-size="16">Grow " Earn " Refer</text>
    <path d="M40 160 H120" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-dasharray="80" stroke-dashoffset="20"/>
  </g>

  <!-- Layer: Writer Character -->
  <g id="character-writer" transform="translate(80, 360)">
    <ellipse cx="55" cy="130" rx="48" ry="12" fill="#1E40AF" opacity="0.35"/>
    <rect x="30" y="70" width="50" height="58" rx="12" fill="#2563EB"/>
    <circle cx="55" cy="48" r="22" fill="#FCD9B6"/>
    <rect x="18" y="88" width="18" height="42" rx="8" fill="#1D4ED8"/>
    <rect x="74" y="88" width="18" height="42" rx="8" fill="#1D4ED8"/>
    <rect x="78" y="52" width="36" height="8" rx="4" fill="#FFFFFF" opacity="0.9" transform="rotate(-20 96 56)"/>
  </g>

  <!-- Layer: Seller Character -->
  <g id="character-seller" transform="translate(180, 780)">
    <ellipse cx="55" cy="130" rx="48" ry="12" fill="#1E40AF" opacity="0.35"/>
    <rect x="30" y="70" width="50" height="58" rx="12" fill="#3B82F6"/>
    <circle cx="55" cy="48" r="22" fill="#FCD9B6"/>
    <rect x="70" y="60" width="28" height="20" rx="6" fill="#FFFFFF" opacity="0.85"/>
    <path d="M76 70 L88 70 L82 78 Z" fill="#2563EB"/>
  </g>

  <!-- Layer: Tablet Character -->
  <g id="character-tablet" transform="translate(1580, 320)">
    <ellipse cx="55" cy="130" rx="48" ry="12" fill="#1E40AF" opacity="0.35"/>
    <rect x="30" y="70" width="50" height="58" rx="12" fill="#2563EB"/>
    <circle cx="55" cy="48" r="22" fill="#FCD9B6"/>
    <rect x="72" y="62" width="44" height="56" rx="8" fill="#FFFFFF" opacity="0.95"/>
    <text x="94" y="88" text-anchor="middle" fill="#2563EB" font-family="Inter,sans-serif" font-size="11" font-weight="700">ą52K</text>
    <path d="M82 98 L88 92 L94 96 L102 86" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Layer: Referral Character -->
  <g id="character-referral" transform="translate(1680, 720)">
    <ellipse cx="55" cy="130" rx="48" ry="12" fill="#1E40AF" opacity="0.35"/>
    <rect x="30" y="70" width="50" height="58" rx="12" fill="#60A5FA"/>
    <circle cx="55" cy="48" r="22" fill="#FCD9B6"/>
    <circle cx="92" cy="72" r="10" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="108" cy="88" r="10" fill="#FFFFFF" opacity="0.75"/>
    <path d="M98 76 C104 82 110 88 116 94" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Layer: Floating Coins -->
  <g id="floating-coins" filter="url(#glow)">
    <circle cx="240" cy="640" r="18" fill="#FBBF24" stroke="#F59E0B" stroke-width="2"/>
    <text x="240" y="646" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">ą</text>
    <circle cx="520" cy="820" r="16" fill="#FBBF24" stroke="#F59E0B" stroke-width="2"/>
    <text x="520" y="826" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">ą</text>
    <circle cx="1380" cy="680" r="18" fill="#FBBF24" stroke="#F59E0B" stroke-width="2"/>
    <text x="1380" y="686" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">ą</text>
    <circle cx="1640" cy="480" r="16" fill="#FBBF24" stroke="#F59E0B" stroke-width="2"/>
    <text x="1640" y="486" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">ą</text>
  </g>

  <!-- Layer: Analytics Cards -->
  <g id="analytics-cards">
    <g transform="translate(280, 520)">
      <rect width="170" height="92" rx="18" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.22"/>
      <text x="20" y="38" fill="#FFFFFF" font-family="Inter,sans-serif" font-size="24" font-weight="700">ą45,230</text>
      <text x="20" y="64" fill="#E0F2FE" font-family="Inter,sans-serif" font-size="13">Total Earnings</text>
    </g>
    <g transform="translate(1480, 140)">
      <rect width="150" height="88" rx="18" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.22"/>
      <text x="20" y="36" fill="#FFFFFF" font-family="Inter,sans-serif" font-size="24" font-weight="700">+234%</text>
      <text x="20" y="62" fill="#E0F2FE" font-family="Inter,sans-serif" font-size="13">Growth</text>
    </g>
    <g transform="translate(320, 860)">
      <rect width="150" height="88" rx="18" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.22"/>
      <text x="20" y="36" fill="#FFFFFF" font-family="Inter,sans-serif" font-size="24" font-weight="700">1200+</text>
      <text x="20" y="62" fill="#E0F2FE" font-family="Inter,sans-serif" font-size="13">Referrals</text>
    </g>
  </g>

  <!-- Layer: Growth Arrows -->
  <g id="growth-arrows" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <path d="M1480 860 L1500 840 L1520 860"/>
    <path d="M1500 840 V880"/>
    <path d="M420 240 L440 220 L460 240"/>
    <path d="M440 220 V260"/>
  </g>

  <!-- Layer: Reward Icons -->
  <g id="reward-icons">
    <g transform="translate(560, 180)">
      <rect width="56" height="56" rx="14" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.2"/>
      <circle cx="28" cy="28" r="14" fill="#FBBF24" opacity="0.9"/>
    </g>
    <g transform="translate(1320, 860)">
      <rect width="56" height="56" rx="14" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.2"/>
      <rect x="16" y="22" width="24" height="18" rx="4" fill="#FFFFFF" opacity="0.85"/>
    </g>
  </g>
</svg>
